name: Pure Self-Contained Builder
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools wget parted dosfstools fdisk

      - name: Create Image and Inject
        run: |
          # 1. Create a 4GB blank image
          fallocate -l 4G alarm.img

          # 2. Partition the image (200MB FAT32 Boot, Remainder EXT4 Root)
          # We use a heredoc to feed commands to fdisk
          sudo fdisk alarm.img <<EOF
          o
          n
          p
          1
          
          +200M
          t
          c
          n
          p
          2
          
          
          w
          EOF

          # 3. Setup Loop Device
          LOOP_DEV=$(sudo losetup --find --show --partscan alarm.img)
          
          # 4. Format partitions
          sudo mkfs.vfat -F 32 -n BOOT "${LOOP_DEV}p1"
          sudo mkfs.ext4 -F -L ROOT "${LOOP_DEV}p2"

          # 5. Mount and Download Arch ARM
          sudo mkdir -p /mnt/root
          sudo mount "${LOOP_DEV}p2" /mnt/root
          sudo mkdir -p /mnt/root/boot
          sudo mount "${LOOP_DEV}p1" /mnt/root/boot

          echo "Downloading Arch Linux ARM..."
          wget -q http://os.archlinuxarm.org/os/ArchLinuxARM-rpi-aarch64-latest.tar.gz
          
          echo "Extracting (this takes a minute)..."
          sudo bsdtar -xpf ArchLinuxARM-rpi-aarch64-latest.tar.gz -C /mnt/root
          
          # 6. Inject your BlackArch files
          if [ -d "blackarch" ]; then
            echo "Injecting your BlackArch files..."
            sudo cp -rp blackarch/. /mnt/root/
          fi

          # 7. Cleanup
          sync
          sudo umount -R /mnt/root
          sudo losetup -d "$LOOP_DEV"

      - name: Upload Finished Image
        uses: actions/upload-artifact@v4
        with:
          name: blackarch-custom-pi
          path: alarm.img

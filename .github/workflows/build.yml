name: High-Capacity Pi Builder
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        # This reclaims ~30GB by removing unnecessary tools
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true

      - name: Checkout Your Repo
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools wget parted dosfstools fdisk

      - name: Create Image and Inject
        run: |
          # 1. Create a 6GB image (larger to accommodate BlackArch + growth)
          fallocate -l 6G alarm.img

          # 2. Partition (Heredoc for non-interactive fdisk)
          # n(new), p(primary), 1(num), default(start), +200M(size), t(type), c(W95 FAT32 LBA)
          # n(new), p(primary), 2(num), default(start), default(end)
          sudo fdisk alarm.img <<EOF
          o
          n
          p
          1
          
          +200M
          t
          c
          n
          p
          2
          
          
          w
          EOF

          # 3. Setup Loop Device
          LOOP_DEV=$(sudo losetup --find --show --partscan alarm.img)
          
          # 4. Format
          sudo mkfs.vfat -F 32 -n BOOT "${LOOP_DEV}p1"
          sudo mkfs.ext4 -F -L ROOT "${LOOP_DEV}p2"

          # 5. Mount
          sudo mkdir -p /mnt/root
          sudo mount "${LOOP_DEV}p2" /mnt/root
          sudo mkdir -p /mnt/root/boot
          sudo mount "${LOOP_DEV}p1" /mnt/root/boot

          # 6. Download and Extract
          wget -q http://os.archlinuxarm.org
          sudo bsdtar -xpf ArchLinuxARM-rpi-aarch64-latest.tar.gz -C /mnt/root
          
          # 7. Inject BlackArch (Ensuring folder exists)
          if [ -d "blackarch" ]; then
            echo "Injecting BlackArch..."
            sudo cp -rp blackarch/. /mnt/root/
          fi

          # 8. Cleanup
          sync
          sudo umount -R /mnt/root
          sudo losetup -d "$LOOP_DEV"
          rm ArchLinuxARM-rpi-aarch64-latest.tar.gz

      - name: Upload Finished Image
        uses: actions/upload-artifact@v4
        with:
          name: blackarch-custom-pi
          path: alarm.img

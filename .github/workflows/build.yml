name: Final Success Builder
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools wget parted dosfstools fdisk

      - name: Fetch Builder
        run: |
          git clone https://github.com/bcomnes/archlinux-arm-img.git builder
          if [ ! -f "builder/build-arch-arm-img.sh" ]; then echo "Clone Failed"; exit 1; fi

      - name: Build and Inject
        run: |
          cd builder
          chmod +x build-arch-arm-img.sh
          sudo ./build-arch-arm-img.sh ArchLinuxARM-rpi-aarch64-latest.tar.gz
          
          IMG_FILE=$(ls images/*.img)
          LOOP_DEV=$(sudo losetup --find --show --partscan "$IMG_FILE")
          sudo mkdir -p /mnt/arch_root
          sudo mount "${LOOP_DEV}p2" /mnt/arch_root
          
          echo "Injecting BlackArch..."
          sudo cp -rp ../blackarch/. /mnt/arch_root/
          
          sudo umount /mnt/arch_root
          sudo losetup -d "$LOOP_DEV"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: blackarch-pi-ready
          path: builder/images/*.img
